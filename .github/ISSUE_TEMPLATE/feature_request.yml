name: 💡 Feature Request
description: Propose a new component, feature, or enhancement for NeoCompose.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. (e.g. "I'm always frustrated when...")
    validations:
      required: false
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the desired API structure, appearance, or behavior...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or visual design references (like Dribbble/Figma links) here.
