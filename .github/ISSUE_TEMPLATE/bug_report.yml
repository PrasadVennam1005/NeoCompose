name: 🐛 Bug Report
description: File a report to help us improve NeoCompose.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Compose Code Snippet
      description: Provide the Compose code snippet where the bug is occurring.
      render: kotlin
      placeholder: |
        NeoButton(
            onClick = { /* ... */ }
        ) {
            Text("Click Me")
        }
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Versions of libraries and tools you are using.
      value: |
        - OS Version:
        - Android Studio Version:
        - Kotlin Version:
        - Compose version:
        - NeoCompose version:
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, logs, or screenshots about the problem here.
