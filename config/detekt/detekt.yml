build:
  maxIssues: 0
  excludeCorrectable: false

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  MagicNumber:
    active: false # Disabled since UI colors, offsets, and angles use magic float/int values frequently
  UnusedPrivateMember:
    active: false
  UnusedParameter:
    active: false

complexity:
  LongParameterList:
    active: true
    threshold: 15 # Composable components naturally have large parameter lists (modifiers, colors, states)
  LongMethod:
    active: true
    threshold: 100

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*' # Allows PascalCase composable function names
  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][a-z0-9]*)*'
